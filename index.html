<script>
// Mismo proyecto Firebase que Stock Nochero, colección propia "combustible"
const FB_PROJECT = 'nochero-stock';
const FB_API_KEY = 'AIzaSyBnuu5MZYI_E8qKWGjgEpjX638lzYK_nMY';
const FB_BASE = `https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents/combustible`;
const FB_BASE_NOCHERO = `https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents/nochero`;

async function fbSave(docName, data, base){
  base = base || FB_BASE;
  try{
    const url = `${base}/${docName}?key=${FB_API_KEY}&updateMask.fieldPaths=data&updateMask.fieldPaths=updatedAt`;
    const body = { fields: { data: { stringValue: JSON.stringify(data) }, updatedAt: { integerValue: String(Date.now()) } } };
    const res = await fetch(url, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if(!res.ok) console.warn('fbSave error:', await res.json());
  } catch(e){ console.warn('fbSave error:', e); }
}
async function fbLoad(docName, base){
  base = base || FB_BASE;
  try{
    const url = `${base}/${docName}?key=${FB_API_KEY}`;
    const res = await fetch(url);
    if(res.status===404) return null;
    if(!res.ok) return null;
    const json = await res.json();
    const val = json?.fields?.data?.stringValue;
    return val ? JSON.parse(val) : null;
  } catch(e){ console.warn('fbLoad error:', e); return null; }
}
</script>

<script>
// ═══════════════════════════════════════════════════
// CONFIGURACIÓN — mismo algoritmo de planilla que Stock Nochero
// ═══════════════════════════════════════════════════
const START_YEAR=2026, START_MONTH=5, START_DAY=13; // jun=5 (0-indexed)
const START_TI=1; // tarde
const P0=19186;
const FK_INICIO='2026-06-13';
const TURNOS=['mañana','tarde','noche'];

const USERS=[
  {id:'franco', name:'Franco', role:'admin',    cargo:'Administrador', pass:'franco123', refuerzo:false},
  {id:'sergio', name:'Sergio', role:'operador', cargo:'Jefe de Turno', pass:'sergio123', refuerzo:false},
  {id:'elias',  name:'Elías',  role:'operador', cargo:'Jefe de Turno', pass:'elias123',  refuerzo:false},
  {id:'luciano',name:'Luciano',role:'operador', cargo:'Jefe de Turno', pass:'luciano123',refuerzo:false},
  {id:'gabi',   name:'Gabi',   role:'operador', cargo:'Jefe de Turno', pass:'gabi123',   refuerzo:false},
  {id:'eitan',  name:'Eitan',  role:'operador', cargo:'Refuerzo',      pass:'eitan123',  refuerzo:true},
  {id:'anibal', name:'Aníbal', role:'operador', cargo:'Refuerzo',      pass:'anibal123', refuerzo:true},
  {id:'agus',   name:'Agus',   role:'operador', cargo:'Refuerzo',      pass:'agus123',   refuerzo:true},
];

// Estructura fija de surtidores / caras / picos — un producto por pico
const PICOS = [
  {pico:1,  surtidor:1, cara:1, producto:'Nafta Super'},
  {pico:2,  surtidor:1, cara:1, producto:'V-Power Nafta'},
  {pico:3,  surtidor:1, cara:1, producto:'Nafta Super C'},
  {pico:4,  surtidor:1, cara:2, producto:'Nafta Super'},
  {pico:5,  surtidor:1, cara:2, producto:'V-Power Nafta'},
  {pico:6,  surtidor:1, cara:2, producto:'Nafta Super C'},
  {pico:7,  surtidor:2, cara:1, producto:'V-Power Diesel'},
  {pico:8,  surtidor:2, cara:1, producto:'Evolux'},
  {pico:9,  surtidor:2, cara:2, producto:'V-Power Diesel'},
  {pico:10, surtidor:2, cara:2, producto:'Evolux'},
  {pico:11, surtidor:3, cara:1, producto:'V-Power Diesel'},
  {pico:12, surtidor:3, cara:1, producto:'Evolux'},

];

const PRODUCT_COLORS = {

function slug(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'_');}

function mediicionesVacias(){
  return PICOS.map(p=>({id:`p${p.pico}`, pico:p.pico, surtidor:p.surtidor, cara:p.cara, producto:p.producto, inicial:null, final:null}));
}

// ═══════════════════════════════════════════════════
// FECHA / TURNO (idéntico algoritmo a Stock Nochero)
// ═══════════════════════════════════════════════════
function ahoraAR(){
  const now=new Date();
  const utc=now.getTime()+now.getTimezoneOffset()*60000;
  const ar=new Date(utc-3*3600000);
  const y=ar.getFullYear(), mo=String(ar.getMonth()+1).padStart(2,'0'), d=String(ar.getDate()).padStart(2,'0');
  const h=ar.getHours(), mi=String(ar.getMinutes()).padStart(2,'0');
  return {fk:`${y}-${mo}-${d}`, hora:h, min:ar.getMinutes(), hhmm:`${String(h).padStart(2,'0')}:${mi}`};
}
function diffDiasFk(fk1, fk2){
  const d1=new Date(fk1+'T12:00:00'), d2=new Date(fk2+'T12:00:00');
  return Math.round((d2-d1)/86400000);
}
function planillaNum(diffDays, ti){
  if(diffDays===0){ if(ti<START_TI) return null; return P0+(ti-START_TI); }
  const turnosDia0=3-START_TI;
  return P0+turnosDia0+(diffDays-1)*3+ti;
}
function turnoActual(){
  const ar=ahoraAR();
  let ti=ar.hora>=7&&ar.hora<15?0:ar.hora>=15&&ar.hora<23?1:2;
  let fk=ar.fk;
  if(ar.hora<7){
    const d=new Date(fk+'T12:00:00'); d.setDate(d.getDate()-1);
    fk=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    ti=2;
  }
  const diff=diffDiasFk(FK_INICIO, fk);
  const num=planillaNum(diff,ti);
  const fecha=new Date(fk+'T12:00:00').toLocaleDateString('es-AR');
  return {fk,ti,diff,num,nombre:TURNOS[ti],fecha,hora:ar.hhmm};
}
function pStr(n){return n?'#'+String(n).padStart(5,'0'):'—';}

const T = turnoActual(); // calculado una vez al cargar

async function doLogin(){
  const uid=document.getElementById('sel-user').value;
  const pass=document.getElementById('inp-pass').value;
  if(!uid||!pass){document.getElementById('login-msg').innerHTML='<div class="alert alert-danger"><i class="ti ti-alert-circle"></i> Completá todos los campos.</div>';return;}
  document.getElementById('login-msg').innerHTML='<div class="alert alert-info"><i class="ti ti-refresh"></i> Verificando...</div>';

  const [fbPasses, fbBloqueados] = await Promise.all([
    fbLoad('passes', FB_BASE_NOCHERO), // misma fuente de contraseñas que Stock Nochero
    fbLoad('bloqueados')
  ]);
  const passes = fbPasses || {};
  bloqueados = fbBloqueados || bloqueados;

  const user = USERS.find(u=>u.id===uid && (passes[u.id]||u.pass)===pass);
  if(!user){document.getElementById('login-msg').innerHTML='<div class="alert alert-danger"><i class="ti ti-alert-circle"></i> Usuario o contraseña incorrectos.</div>';return;}
  if(bloqueados[uid]){document.getElementById('login-msg').innerHTML='<div class="alert alert-danger" style="font-size:15px;font-weight:700;justify-content:center;padding:1rem"><i class="ti ti-ban"></i> NO AUTORIZADO</div>';return;}

  currentUser=user;
  document.getElementById('inp-pass').value='';
  document.getElementById('login-msg').innerHTML='';

  await cargarEstadoTurno();

  if(user.role==='admin'){
    document.getElementById('adm-user-badge').textContent=user.name+' · Admin';
    showScreen('admin'); showAdm('resumen', document.querySelector('.tab'));
  } else {
    document.getElementById('op-user-badge').textContent=user.name+' · '+user.cargo;
    showScreen('operador');
    renderOperador();
  }
}
function doLogout(){currentUser=null;showScreen('login');}

// ═══════════════════════════════════════════════════
// CARGA / GUARDADO DE ESTADO
// ═══════════════════════════════════════════════════
async function cargarEstadoTurno(){
  const [cerrados, draft, preciosGuardados] = await Promise.all([
    fbLoad('turnosCerrados'), fbLoad('draftActual'), fbLoad('precios')
  ]);
  turnosCerrados = cerrados || {};
  if(preciosGuardados) precios = preciosGuardados;
  else PRODUCTOS.forEach(p=>precios[p]=precios[p]||0);

  const key=`T${T.num}`;
  if(turnosCerrados[key]){
    // el turno ya fue cerrado por otro usuario
    mediciones = turnosCerrados[key].mediciones;
    pagos = turnosCerrados[key].pagos;
    cuentaCorriente = turnosCerrados[key].cuentaCorriente || [];
  } else if(draft && draft[key]){
    mediciones = draft[key].mediciones || mediicionesVacias();
    pagos = draft[key].pagos || pagos;
    cuentaCorriente = draft[key].cuentaCorriente || [];
    if(draft[key].precios) precios = draft[key].precios;
  } else {
    mediciones = mediicionesVacias();
    cuentaCorriente = [];
  }
  syncCuentaCorriente();
}

async function guardarDraft(){
  const key=`T${T.num}`;
  const draft = await fbLoad('draftActual') || {};
  draft[key] = {mediciones, pagos, precios, cuentaCorriente, user:currentUser?.name, fecha:T.fecha, turno:T.nombre};
  await fbSave('draftActual', draft);
}

async function guardarPrecios(){
  await fbSave('precios', precios);
  toast('✓ Precios guardados','success');
}

// Formato de precio: $ + miles con punto (ej. 1500 -> "1.500")
function formatMiles(n){ return Math.round(n).toLocaleString('es-AR'); }
function onPrecioInput(el){
  el.value = el.value.replace(/[^0-9]/g,'');
}
function onPrecioBlur(prod, el){
  const raw = el.value.replace(/[^0-9]/g,'');
  const n = raw ? parseInt(raw,10) : 0;
  precios[prod]=n;
  if(n>0){ el.value=formatMiles(n); el.classList.remove('campo-vacio'); el.classList.add('campo-cargado'); }
  else { el.value=''; el.classList.add('campo-vacio'); el.classList.remove('campo-cargado'); }
  guardarDraft();
  renderTotales();
  renderAvisosPrecios();
}
function toggleKeroseno(){
  kerosenoDesbloqueado = !kerosenoDesbloqueado;
  renderOperador();
}

// Diferencia de precio sospechosa vs. el turno anterior (posible error de tipeo)
const DIFERENCIA_PRECIO_SOSPECHOSA = 100; // $ por litro, ajustable
function buscarPrecioTurnoAnterior(producto){
  let n = T.num-1, intentos=0;
  while(n>=P0 && intentos<9){
    const c = turnosCerrados[`T${n}`];
    if(c && c.precios && c.precios[producto]>0) return {valor:c.precios[producto], planilla:n};
    n--; intentos++;
  }
  return null;
}
function detectarAdvertenciasPrecios(){
  const avisos=[];
  PRODUCTOS.forEach(p=>{
    if(p==='Kerosene') return; // no se comercializa
    const actual = precios[p]||0;
    if(actual<=0) return;
    const prev = buscarPrecioTurnoAnterior(p);
    if(prev && Math.abs(actual-prev.valor) > DIFERENCIA_PRECIO_SOSPECHOSA){
      const diff = actual-prev.valor;
      const signo = diff>0?'+':'';
      avisos.push(`<strong>${p}</strong>: pasó de $${prev.valor.toLocaleString('es-AR')} (planilla ${pStr(prev.planilla)}) a $${actual.toLocaleString('es-AR')} (${signo}${diff.toLocaleString('es-AR')}). Revisá que no sea un error de tipeo — si es un aumento real, podés ignorar este aviso.`);
    }
  });
  return avisos;
}
function renderAvisosPrecios(){
  const el = document.getElementById('avisos-precios-wrap');
  if(!el) return;
  const avisos = detectarAdvertenciasPrecios();
  el.innerHTML = avisos.map(t=>`<div class="aviso-box aviso-warning"><i class="ti ti-alert-triangle"></i><span>${t}</span></div>`).join('');
}

// ═══════════════════════════════════════════════════
// CUENTA CORRIENTE — venta a clientes a cuenta
// ═══════════════════════════════════════════════════
function sumCuentaCorriente(){ return cuentaCorriente.reduce((s,r)=>s+(r.importe||0),0); }
function syncCuentaCorriente(){ pagos.cuentaCorriente = sumCuentaCorriente(); }

function agregarCuentaCorriente(){
  const fecha = document.getElementById('cc-fecha').value || T.fk;
  const cliente = document.getElementById('cc-cliente').value.trim();
  const producto = document.getElementById('cc-producto').value;
  const litrosRaw = document.getElementById('cc-litros').value;
  const importeRaw = document.getElementById('cc-importe').value;
  let litros = litrosRaw!==''? parseFloat(litrosRaw) : null;
  let importe = importeRaw!==''? parseFloat(importeRaw) : null;

  if(!fecha || !cliente || !producto){
    toast('Completá fecha, cliente y producto','error'); return;
  }
  if((litros==null||isNaN(litros)) && (importe==null||isNaN(importe))){
    toast('Cargá los litros o el importe en pesos','error'); return;
  }
  const precio = precios[producto]||0;
  if(precio<=0){
    toast(`${producto} todavía no tiene precio cargado — cargalo arriba primero`,'error'); return;
  }
  // Obligación: el combustible. El otro valor (litros o importe) se calcula automático.
  if(litros!=null && !isNaN(litros) && (importe==null||isNaN(importe))){
    importe = litros*precio;
  } else if(importe!=null && !isNaN(importe) && (litros==null||isNaN(litros))){
    litros = importe/precio;
  }
  if(litros==null||importe==null||isNaN(litros)||isNaN(importe)||litros<=0||importe<=0){
    toast('Revisá los valores cargados','error'); return;
  }
  cuentaCorriente.push({id:'cc'+Date.now(), fecha, litros, cliente, producto, importe});
  syncCuentaCorriente();
  guardarDraft();
  renderOperador();
}
function eliminarCuentaCorriente(id){
  cuentaCorriente = cuentaCorriente.filter(r=>r.id!==id);
  syncCuentaCorriente();
  guardarDraft();
  renderOperador();
}
function renderCuentaCorriente(cerrado){
  const filas = cuentaCorriente.map(r=>`<tr>
    <td>${r.fecha}</td>
    <td style="text-align:right">${r.litros.toLocaleString('es-AR',{maximumFractionDigits:1})}</td>
    <td>${r.cliente}</td>
    <td><span class="producto-dot" style="background:${PRODUCT_COLORS[r.producto]||'#6b7280'}"></span>${r.producto}</td>
    <td style="text-align:right">$${r.importe.toLocaleString('es-AR',{maximumFractionDigits:0})}</td>
    <td>${cerrado?'':`<button class="btn btn-sm btn-danger" onclick="eliminarCuentaCorriente('${r.id}')"><i class="ti ti-trash"></i></button>`}</td>
  </tr>`).join('');
  const total = sumCuentaCorriente();
  document.getElementById('cc-wrap').innerHTML = `
    ${cerrado?'':`<p style="font-size:12px;color:#6b7280;margin-bottom:.5rem"><i class="ti ti-info-circle"></i> Cargá <strong>litros</strong> o <strong>importe</strong> — el que falte se calcula solo según el precio del combustible. El producto es obligatorio.</p>
    <div class="cc-form">
      <div><label>Fecha</label><input type="date" id="cc-fecha" value="${T.fk}"></div>
      <div><label>Producto</label><select id="cc-producto">${PRODUCTOS.filter(p=>p!=='Kerosene').map(p=>`<option value="${p}">${p}</option>`).join('')}</select></div>
      <div><label>Cliente</label><input type="text" id="cc-cliente" placeholder="Nombre"></div>
      <div><label>Litros</label><input type="number" step="0.1" id="cc-litros" placeholder="ej. 70"></div>
      <div><label>Importe ($)</label><input type="number" step="0.01" id="cc-importe" placeholder="ej. 89250"></div>
      <div><button class="btn btn-primary btn-block" onclick="agregarCuentaCorriente()"><i class="ti ti-plus"></i> Agregar</button></div>
    </div>`}
    <div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Litros</th><th>Cliente</th><th>Producto</th><th>Importe</th><th></th></tr></thead><tbody>
    ${filas || '<tr><td colspan="6" style="text-align:center;color:#9ca3af">Sin cargas todavía</td></tr>'}
    </tbody></table></div>
    <div class="total-line grand" style="margin-top:8px"><span>TOTAL CUENTA CORRIENTE</span><span>$${total.toLocaleString('es-AR',{maximumFractionDigits:0})}</span></div>`;
}

// ═══════════════════════════════════════════════════
// ADVERTENCIAS DE LECTURA — evitar errores de tipeo
// ═══════════════════════════════════════════════════
// Busca el Final con el que cerró este mismo pico en el turno anterior más reciente
function buscarFinalTurnoAnterior(pico){
  let n = T.num-1, intentos=0;
  while(n>=P0 && intentos<9){
    const c = turnosCerrados[`T${n}`];
    if(c){
      const m = (c.mediciones||[]).find(x=>x.pico===pico);
      if(m && m.final!=null) return {valor:m.final, planilla:n};
    }
    n--; intentos++;
  }
  return null;
}
const LITROS_SOSPECHOSOS = 10000; // umbral por pico por turno, ajustable

function detectarAdvertenciasMediciones(){
  const avisos=[];
  PICOS.forEach(p=>{
    const m = mediciones.find(x=>x.pico===p.pico);
    if(m.inicial!=null && m.final!=null){
      if(m.final < m.inicial){
        avisos.push({tipo:'error', texto:`<strong>Pico ${p.pico}</strong> (${p.producto}, Surtidor ${p.surtidor}): el Final (${m.final.toLocaleString('es-AR')}) es menor al Inicial (${m.inicial.toLocaleString('es-AR')}). El final nunca puede ser menor al inicial — a lo sumo igual, si no se vendió nada.`});
      } else {
        const litros = m.final-m.inicial;
        if(litros > LITROS_SOSPECHOSOS){
          avisos.push({tipo:'warning', texto:`<strong>Pico ${p.pico}</strong> (${p.producto}): ${litros.toLocaleString('es-AR')} L vendidos en el turno es un valor muy alto — revisá que no falte o sobre un dígito.`});
        }
      }
    }
    const prev = buscarFinalTurnoAnterior(p.pico);
    if(prev!=null && m.inicial!=null && m.inicial!==prev.valor){
      avisos.push({tipo:'warning', texto:`<strong>Pico ${p.pico}</strong> (${p.producto}): la planilla ${pStr(prev.planilla)} cerró este pico en ${prev.valor.toLocaleString('es-AR')}, pero cargaste ${m.inicial.toLocaleString('es-AR')} como Inicial. Verificá la lectura del surtidor.`});
    }
  });
  return avisos;
}

function renderAvisosMediciones(cerrado){
  const el = document.getElementById('avisos-mediciones-wrap');
  if(!el) return;
  if(cerrado){ el.innerHTML=''; return; }
  const avisos = detectarAdvertenciasMediciones();
  el.innerHTML = avisos.map(a=>`<div class="aviso-box aviso-${a.tipo}"><i class="ti ti-${a.tipo==='error'?'alert-circle':'alert-triangle'}"></i><span>${a.texto}</span></div>`).join('');
}

function actualizarMedicion(id, campo, val){
  const m = mediciones.find(x=>x.id===id);
  m[campo] = val===''?null:parseFloat(val);
  guardarDraft();
  renderTotales();
  // repintar solo litros de esa fila sin perder foco de otros inputs
  renderOperador();
}
function actualizarPago(id, val){
  pagos[id] = val===''?null:parseFloat(val);
  guardarDraft();
  renderTotales();
}

function calcularTotales(){
  const porProducto = PRODUCTOS.map(prod=>{
    const litros = mediciones.filter(m=>m.producto===prod)
      .reduce((s,m)=> s + ((m.final!=null && m.inicial!=null) ? Math.max(0,m.final-m.inicial) : 0), 0);
    const precio = precios[prod]||0;
    return {producto:prod, litros, importe: litros*precio};
  });
  const totalCombustibles = porProducto.reduce((s,p)=>s+p.importe,0);
  const totalPagos = MEDIOS_PAGO.reduce((s,m)=>s+(pagos[m.id]||0),0);
  return {porProducto, totalCombustibles, totalPagos, diferencia: totalPagos - totalCombustibles};
}

function renderTotales(){
  const {porProducto, totalCombustibles, totalPagos, diferencia} = calcularTotales();
  document.getElementById('totales-wrap').innerHTML =
    porProducto.map(p=>{
      const color = PRODUCT_COLORS[p.producto]||'#6b7280';
      return `<div class="total-line"><span><span class="producto-dot" style="background:${color}"></span><span style="font-weight:700;color:${color}">${p.producto}</span> <span style="color:#9ca3af">(${p.litros.toLocaleString('es-AR',{maximumFractionDigits:1})} L)</span></span><span style="font-weight:700;font-size:15px">$${p.importe.toLocaleString('es-AR',{maximumFractionDigits:0})}</span></div>`;
    }).join('')
    + `<div class="total-line grand"><span>TOTAL COMBUSTIBLES</span><span>$${totalCombustibles.toLocaleString('es-AR',{maximumFractionDigits:0})}</span></div>`;

  const diffClass = Math.abs(diferencia)<1 ? 'diff-ok' : 'diff-bad';
  document.getElementById('diferencia-wrap').innerHTML =
    `<div class="total-line"><span>Total medios de pago</span><span>$${totalPagos.toLocaleString('es-AR',{maximumFractionDigits:0})}</span></div>
     <div class="total-line grand"><span>Diferencia de caja</span><span class="${diffClass}">$${diferencia.toLocaleString('es-AR',{maximumFractionDigits:0})}</span></div>`;
}

function validarCierre(){
  const errores=[];
  PRODUCTOS.forEach(p=>{
    if(p==='Kerosene') return; // excepción: no se comercializa
    if(!precios[p] || precios[p]<=0) errores.push(`Falta el precio de <strong>${p}</strong>`);
  });
  PICOS.forEach(p=>{
    if(p.producto==='Kerosene') return; // excepción
    const m = mediciones.find(x=>x.pico===p.pico);
    if(m.inicial==null || m.final==null) errores.push(`Falta cargar el Pico ${p.pico} — ${p.producto} (Surtidor ${p.surtidor}, Cara ${p.cara})`);
    else if(m.final < m.inicial) errores.push(`Pico ${p.pico} — ${p.producto}: el Final no puede ser menor al Inicial`);
  });
  return errores;
}

async function confirmarCierre(){
  const errores = validarCierre();
  if(errores.length){
    document.getElementById('modal').innerHTML = `
      <div class="modal-overlay">
        <div class="modal">
          <h2><i class="ti ti-alert-triangle" style="color:#A32D2D"></i> Faltan datos para cerrar</h2>
          <p style="text-align:left">${errores.map(e=>'• '+e).join('<br>')}</p>
          <div class="modal-btns"><button class="btn btn-primary" onclick="document.getElementById('modal').innerHTML=''">Entendido</button></div>
        </div>
      </div>`;
    return;
  }
  const {totalCombustibles, totalPagos, diferencia, porProducto} = calcularTotales();
  document.getElementById('modal').innerHTML = `
    <div class="modal-overlay">
      <div class="modal">
        <h2><i class="ti ti-lock"></i> Confirmar cierre</h2>
        <p>Planilla <strong>${pStr(T.num)}</strong> · Turno <strong>${T.nombre}</strong> · ${T.fecha}<br><br>
        Total combustibles: <strong>$${totalCombustibles.toLocaleString('es-AR')}</strong><br>
        Total medios de pago: <strong>$${totalPagos.toLocaleString('es-AR')}</strong><br>
        Diferencia de caja: <strong>$${diferencia.toLocaleString('es-AR')}</strong><br><br>
        Esta acción no se puede deshacer. ¿Confirmás el cierre?</p>
        <div class="modal-btns">
          <button class="btn" onclick="document.getElementById('modal').innerHTML=''">Cancelar</button>
          <button class="btn btn-green" onclick="cerrarTurno()">Confirmar cierre</button>
        </div>
      </div>
    </div>`;
}

async function cerrarTurno(){
  if(validarCierre().length){ toast('Faltan datos, revisá el turno','error'); document.getElementById('modal').innerHTML=''; return; }
  const {porProducto, totalCombustibles, totalPagos, diferencia} = calcularTotales();
  const cerrados = await fbLoad('turnosCerrados') || {};
  cerrados[`T${T.num}`] = {
    planilla:T.num, fecha:T.fecha, turno:T.nombre, cerradoPor:currentUser.name, hora:ahoraAR().hhmm,
    mediciones, precios: {...precios}, pagos: {...pagos}, cuentaCorriente: [...cuentaCorriente], porProducto, totalCombustibles, totalPagos, diferencia
  };
  await fbSave('turnosCerrados', cerrados);
  turnosCerrados = cerrados;
  document.getElementById('modal').innerHTML='';
  toast('✓ Turno '+pStr(T.num)+' cerrado','success');
  renderOperador();
}

// ═══════════════════════════════════════════════════
// ADMIN
// ═══════════════════════════════════════════════════
let admSection='resumen';
function showAdm(sec, el){
  admSection=sec;
  document.querySelectorAll('#screen-admin .tab').forEach(t=>t.classList.remove('active'));
  if(el) el.classList.add('active');
  renderAdmContent();
}
async function renderAdmContent(){
  const el=document.getElementById('adm-content');
  if(admSection==='resumen'){
    const cerrados = await fbLoad('turnosCerrados') || {};
    turnosCerrados = cerrados;
    const lista = Object.values(cerrados).sort((a,b)=>b.planilla-a.planilla).slice(0,10);
    const totalHoy = Object.values(cerrados).filter(c=>c.fecha===T.fecha).reduce((s,c)=>s+c.totalCombustibles,0);
    el.innerHTML = `
      <div class="metrics">
        <div class="metric"><div class="metric-val">${pStr(T.num)}</div><div class="metric-lbl">Planilla actual</div></div>
        <div class="metric"><div class="metric-val">$${totalHoy.toLocaleString('es-AR',{maximumFractionDigits:0})}</div><div class="metric-lbl">Vendido hoy</div></div>
        <div class="metric"><div class="metric-val">${Object.keys(cerrados).length}</div><div class="metric-lbl">Turnos cerrados (total)</div></div>
      </div>
      <div class="card"><div class="section-title"><i class="ti ti-history"></i> Últimos turnos cerrados</div>
      <div class="table-wrap"><table><thead><tr><th>Planilla</th><th>Fecha</th><th>Turno</th><th>Cerró</th><th>Total</th><th>Diferencia</th></tr></thead><tbody>
      ${lista.map(c=>`<tr><td>${pStr(c.planilla)}</td><td>${c.fecha}</td><td><span class="badge badge-${c.turno}">${c.turno}</span></td><td>${c.cerradoPor}</td><td>$${c.totalCombustibles.toLocaleString('es-AR',{maximumFractionDigits:0})}</td><td class="${Math.abs(c.diferencia)<1?'diff-ok':'diff-bad'}">$${c.diferencia.toLocaleString('es-AR',{maximumFractionDigits:0})}</td></tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:#9ca3af">Todavía no hay turnos cerrados</td></tr>'}
      </tbody></table></div></div>`;
  } else if(admSection==='turnos'){
    const cerrados = await fbLoad('turnosCerrados') || {};
    const lista = Object.values(cerrados).sort((a,b)=>b.planilla-a.planilla);
    el.innerHTML = `<div class="card"><div class="table-wrap"><table><thead><tr><th>Planilla</th><th>Fecha</th><th>Turno</th><th>Cerró</th><th>Hora</th><th>Combustibles</th><th>Pagos</th><th>Diferencia</th><th></th></tr></thead><tbody>
      ${lista.map(c=>`<tr><td>${pStr(c.planilla)}</td><td>${c.fecha}</td><td><span class="badge badge-${c.turno}">${c.turno}</span></td><td>${c.cerradoPor}</td><td>${c.hora}</td><td>$${c.totalCombustibles.toLocaleString('es-AR',{maximumFractionDigits:0})}</td><td>$${c.totalPagos.toLocaleString('es-AR',{maximumFractionDigits:0})}</td><td class="${Math.abs(c.diferencia)<1?'diff-ok':'diff-bad'}">$${c.diferencia.toLocaleString('es-AR',{maximumFractionDigits:0})}</td><td><button class="btn btn-sm" onclick="imprimirTurno(${c.planilla})"><i class="ti ti-file-download"></i> PDF</button></td></tr>`).join('') || '<tr><td colspan="9" style="text-align:center;color:#9ca3af">Sin turnos cerrados todavía</td></tr>'}
    </tbody></table></div></div>`;
  } else if(admSection==='usuarios'){
    const b = await fbLoad('bloqueados') || bloqueados;
    bloqueados = b;
    el.innerHTML = `<div class="card"><p style="font-size:13px;color:#6b7280;margin-bottom:1rem">Bloqueo propio de esta app (no afecta Stock Nochero). Las contraseñas se administran desde Stock Nochero.</p>
      <div class="table-wrap"><table><thead><tr><th>Nombre</th><th>Cargo</th><th>Estado</th><th></th></tr></thead><tbody>
      ${USERS.map(u=>`<tr><td>${u.name}</td><td>${u.cargo}</td><td>${bloqueados[u.id]?'<span class="badge badge-out">Bloqueado</span>':'<span class="badge badge-ok">Habilitado</span>'}</td><td><button class="btn btn-sm" onclick="toggleBloqueo('${u.id}')">${bloqueados[u.id]?'Habilitar':'Bloquear'}</button></td></tr>`).join('')}
      </tbody></table></div></div>`;
  }
}
// ═══════════════════════════════════════════════════
// EXPORTAR PDF (vía impresión del navegador)
// ═══════════════════════════════════════════════════
function imprimirTurno(numPlanilla){
  const c = turnosCerrados[`T${numPlanilla}`];
  if(!c){toast('Turno no encontrado','error');return;}
  const filasMediciones = PICOS.map(p=>{
    const m = c.mediciones.find(x=>x.pico===p.pico);
    const litros = (m.final!=null && m.inicial!=null) ? Math.max(0,(m.final-m.inicial)) : 0;
    return `<tr><td>${p.surtidor}</td><td>${p.cara}</td><td>${p.pico}</td><td>${p.producto}</td><td style="text-align:right">${m.inicial??'—'}</td><td style="text-align:right">${m.final??'—'}</td><td style="text-align:right">${litros.toLocaleString('es-AR',{maximumFractionDigits:1})}</td></tr>`;
  }).join('');
  const filasProductos = c.porProducto.map(p=>`<tr><td>${p.producto}</td><td style="text-align:right">$${(c.precios[p.producto]||0).toLocaleString('es-AR')}</td><td style="text-align:right">${p.litros.toLocaleString('es-AR',{maximumFractionDigits:1})}</td><td style="text-align:right">$${p.importe.toLocaleString('es-AR',{maximumFractionDigits:0})}</td></tr>`).join('');
  const filasPagos = MEDIOS_PAGO.map(m=>`<tr><td>${m.label}</td><td style="text-align:right">$${(c.pagos[m.id]||0).toLocaleString('es-AR')}</td></tr>`).join('');
  const cc = c.cuentaCorriente || [];
  const filasCC = cc.map(r=>`<tr><td>${r.fecha}</td><td style="text-align:right">${r.litros.toLocaleString('es-AR',{maximumFractionDigits:1})}</td><td>${r.cliente}</td><td>${r.producto}</td><td style="text-align:right">$${r.importe.toLocaleString('es-AR')}</td></tr>`).join('');
  const totalCC = cc.reduce((s,r)=>s+(r.importe||0),0);
  const win = window.open('','_blank');
  win.document.write(`
    <html><head><title>Combustibles Cierre — Planilla ${pStr(numPlanilla)}</title>
    <style>
      body{font-family:Arial,sans-serif;padding:24px;color:#1a1a1a;font-size:13px}
      h1{font-size:18px;margin-bottom:2px}h2{font-size:14px;margin:18px 0 6px}
      table{width:100%;border-collapse:collapse;margin-bottom:12px}
      th,td{border:1px solid #ccc;padding:5px 8px;font-size:12px}
      th{background:#f3f4f6;text-align:left}
      .meta{color:#555;margin-bottom:14px}
      .tot{font-weight:700}
      @media print{.no-print{display:none}}
    </style></head><body>
    <h1>⛽ Combustibles Cierre — Planilla ${pStr(numPlanilla)}</h1>
    <div class="meta">Turno <strong>${c.turno}</strong> · ${c.fecha} · Cerró: <strong>${c.cerradoPor}</strong> a las ${c.hora}</div>
    <h2>Lectura de surtidores — Aforadores mecánicos</h2>
    <table><thead><tr><th>Surtidor</th><th>Cara</th><th>Pico</th><th>Producto</th><th>Inicial</th><th>Final</th><th>Litros</th></tr></thead><tbody>${filasMediciones}</tbody></table>
    <h2>Totales por producto</h2>
    <table><thead><tr><th>Producto</th><th>Precio/L</th><th>Litros</th><th>Importe</th></tr></thead><tbody>${filasProductos}
    <tr class="tot"><td colspan="3">TOTAL COMBUSTIBLES</td><td style="text-align:right">$${c.totalCombustibles.toLocaleString('es-AR',{maximumFractionDigits:0})}</td></tr></tbody></table>
    <h2>Medios de pago</h2>
    <table><thead><tr><th>Medio</th><th>Importe</th></tr></thead><tbody>${filasPagos}
    <tr class="tot"><td>TOTAL PAGOS</td><td style="text-align:right">$${c.totalPagos.toLocaleString('es-AR',{maximumFractionDigits:0})}</td></tr>
    <tr class="tot"><td>DIFERENCIA DE CAJA</td><td style="text-align:right">$${c.diferencia.toLocaleString('es-AR',{maximumFractionDigits:0})}</td></tr></tbody></table>
    ${cc.length ? `<h2>Cuenta corriente — venta a clientes</h2>
    <table><thead><tr><th>Fecha</th><th>Litros</th><th>Cliente</th><th>Producto</th><th>Importe</th></tr></thead><tbody>${filasCC}
    <tr class="tot"><td colspan="4">TOTAL CUENTA CORRIENTE</td><td style="text-align:right">$${totalCC.toLocaleString('es-AR',{maximumFractionDigits:0})}</td></tr></tbody></table>` : ''}
    <button class="no-print" onclick="window.print()" style="padding:8px 16px;margin-top:10px">Imprimir / Guardar PDF</button>
    </body></html>`);
  win.document.close();
  setTimeout(()=>win.print(), 400);
}

async function toggleBloqueo(uid){
  bloqueados[uid] = !bloqueados[uid];
  await fbSave('bloqueados', bloqueados);
  toast('✓ Actualizado','success');
  renderAdmContent();
}
</script>
